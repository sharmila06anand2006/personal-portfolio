<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Sharmila A Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0A192F;
            --bg-secondary: #112240;
            --accent: #64FFDA;
            --accent-blue: #0EA5E9;
            --text-light: #CCD6F6;
            --text-muted: #8892B0;
            --danger: #FF6B6B;
            --success: #51CF66;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #0D1F3C 100%);
            color: var(--text-light);
            line-height: 1.6;
        }

        .admin-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: rgba(10, 25, 47, 0.95);
            border-right: 1px solid rgba(100, 255, 218, 0.1);
            padding: 2rem 1rem;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .logo {
            color: var(--accent);
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-menu {
            list-style: none;
        }

        .nav-item {
            margin-bottom: 1rem;
        }

        .nav-link {
            display: block;
            padding: 0.75rem 1rem;
            color: var(--text-light);
            text-decoration: none;
            border-radius: 6px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .nav-link:hover,
        .nav-link.active {
            background: rgba(100, 255, 218, 0.1);
            color: var(--accent);
        }

        .main-content {
            margin-left: 250px;
            flex: 1;
            padding: 2rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(100, 255, 218, 0.1);
        }

        .header h1 {
            font-size: 2rem;
        }

        .logout-btn {
            padding: 0.5rem 1.5rem;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            opacity: 0.8;
            transform: translateY(-2px);
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .card {
            background: rgba(100, 255, 218, 0.05);
            border: 1px solid rgba(100, 255, 218, 0.1);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            background: rgba(100, 255, 218, 0.05);
            border: 1px solid rgba(100, 255, 218, 0.1);
            border-radius: 6px;
            color: var(--text-light);
            font-family: inherit;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--text-muted);
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(100, 255, 218, 0.08);
            box-shadow: 0 0 15px rgba(100, 255, 218, 0.2);
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-blue) 100%);
            color: var(--bg-primary);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(100, 255, 218, 0.3);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            opacity: 0.8;
        }

        .btn-secondary {
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
        }

        .btn-secondary:hover {
            background: rgba(100, 255, 218, 0.1);
        }

        .projects-grid,
        .messages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .project-item,
        .message-item {
            background: rgba(100, 255, 218, 0.05);
            border: 1px solid rgba(100, 255, 218, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .project-item:hover,
        .message-item:hover {
            border-color: var(--accent);
            box-shadow: 0 8px 25px rgba(100, 255, 218, 0.15);
        }

        .project-title,
        .message-subject {
            color: var(--accent);
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .project-tech {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .tech-tag {
            display: inline-block;
            background: rgba(100, 255, 218, 0.15);
            color: var(--accent);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .actions .btn {
            flex: 1;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        .table thead {
            background: rgba(100, 255, 218, 0.1);
        }

        .table th,
        .table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(100, 255, 218, 0.1);
        }

        .table th {
            color: var(--accent);
            font-weight: 600;
        }

        .message-status {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .status-unread {
            background: rgba(255, 107, 107, 0.2);
            color: #FF6B6B;
        }

        .status-read {
            background: rgba(81, 207, 102, 0.2);
            color: var(--success);
        }

        .status-replied {
            background: rgba(100, 255, 218, 0.2);
            color: var(--accent);
        }

        .alert {
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background: rgba(81, 207, 102, 0.2);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .alert-error {
            background: rgba(255, 107, 107, 0.2);
            color: #FF6B6B;
            border: 1px solid #FF6B6B;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 3px solid rgba(100, 255, 218, 0.2);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                padding: 1rem;
                border-right: none;
                border-bottom: 1px solid rgba(100, 255, 218, 0.1);
            }

            .main-content {
                margin-left: 0;
            }

            .projects-grid,
            .messages-grid {
                grid-template-columns: 1fr;
            }

            .table {
                font-size: 0.9rem;
            }

            .table th,
            .table td {
                padding: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">
                <i class="fas fa-shield-alt"></i>
                Admin Panel
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a class="nav-link active" onclick="showSection('dashboard')">
                        <i class="fas fa-chart-line"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" onclick="showSection('projects')">
                        <i class="fas fa-project-diagram"></i> Projects
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" onclick="showSection('messages')">
                        <i class="fas fa-envelope"></i> Messages
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                </li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <div class="header">
                <h1>Admin Dashboard</h1>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>

            <!-- Dashboard Section -->
            <div id="dashboard" class="section active">
                <h2>Welcome to Admin Panel</h2>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-top: 2rem;">
                    <div class="card" style="text-align: center;">
                        <div style="font-size: 2rem; color: var(--accent); margin-bottom: 0.5rem;">
                            <i class="fas fa-project-diagram"></i>
                        </div>
                        <div style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.5rem;">Total Projects</div>
                        <div id="projectCount" style="font-size: 2rem; font-weight: 700; color: var(--accent);">0</div>
                    </div>
                    <div class="card" style="text-align: center;">
                        <div style="font-size: 2rem; color: var(--accent); margin-bottom: 0.5rem;">
                            <i class="fas fa-envelope"></i>
                        </div>
                        <div style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.5rem;">Total Messages</div>
                        <div id="messageCount" style="font-size: 2rem; font-weight: 700; color: var(--accent);">0</div>
                    </div>
                </div>
            </div>

            <!-- Projects Section -->
            <div id="projects" class="section">
                <h2>Manage Projects</h2>
                
                <!-- Add Project Form -->
                <div class="card">
                    <h3 style="color: var(--accent); margin-bottom: 1rem;">Add New Project</h3>
                    <form id="projectForm" onsubmit="addProject(event)">
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem;">
                            <div class="form-group">
                                <label>Project Title</label>
                                <input type="text" id="projectTitle" placeholder="Project title" required>
                            </div>
                            <div class="form-group">
                                <label>Short Description</label>
                                <input type="text" id="projectDescription" placeholder="Short description" required>
                            </div>
                            <div class="form-group">
                                <label>Technologies (comma-separated)</label>
                                <input type="text" id="projectTechs" placeholder="e.g., Node.js, MongoDB, React" required>
                            </div>
                            <div class="form-group">
                                <label>GitHub Link</label>
                                <input type="url" id="projectGithub" placeholder="https://github.com/...">
                            </div>
                            <div class="form-group">
                                <label>Live Link</label>
                                <input type="url" id="projectLive" placeholder="https://...">
                            </div>
                            <div class="form-group">
                                <label>Image URL</label>
                                <input type="url" id="projectImage" placeholder="https://...">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Long Description</label>
                            <textarea id="projectLongDesc" placeholder="Detailed description" rows="4"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Add Project</button>
                    </form>
                </div>

                <!-- Projects List -->
                <div id="projectsList" class="projects-grid"></div>
            </div>

            <!-- Messages Section -->
            <div id="messages" class="section">
                <h2>Contact Messages</h2>
                <div id="messagesList"></div>
            </div>
        </div>
    </div>

    <script>
        // Check authentication
        function checkAuth() {
            const token = localStorage.getItem('adminToken');
            if (!token) {
                window.location.href = '/admin-login.html';
                return false;
            }
            return token;
        }

        // Show section
        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');

            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            event.target.closest('.nav-link').classList.add('active');

            if (sectionId === 'projects') {
                loadProjects();
            } else if (sectionId === 'messages') {
                loadMessages();
            } else if (sectionId === 'dashboard') {
                loadDashboard();
            }
        }

        // Load dashboard stats
        async function loadDashboard() {
            try {
                const [projectRes, messageRes] = await Promise.all([
                    fetch('/api/projects'),
                    fetch('/api/contact', {
                        headers: { 'Authorization': `Bearer ${checkAuth()}` }
                    })
                ]);

                const projects = await projectRes.json();
                const messages = await messageRes.json();

                document.getElementById('projectCount').textContent = projects.data?.length || 0;
                document.getElementById('messageCount').textContent = messages.data?.length || 0;
            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }

        // Load projects
        async function loadProjects() {
            try {
                const res = await fetch('/api/projects');
                const data = await res.json();

                const projectsList = document.getElementById('projectsList');
                if (!data.data || data.data.length === 0) {
                    projectsList.innerHTML = '<div class="empty-state">No projects found. Add one to get started!</div>';
                    return;
                }

                projectsList.innerHTML = data.data.map(project => `
                    <div class="project-item">
                        <div class="project-title">${project.title}</div>
                        <p style="color: var(--text-muted); margin-bottom: 0.5rem;">${project.description}</p>
                        <div class="project-tech">
                            ${project.technologies.map(t => `<span class="tech-tag">${t}</span>`).join('')}
                        </div>
                        <div style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1rem;">
                            ${new Date(project.date).toLocaleDateString()}
                        </div>
                        <div class="actions">
                            <button class="btn btn-secondary" onclick="editProject('${project._id}')">Edit</button>
                            <button class="btn btn-danger" onclick="deleteProject('${project._id}')">Delete</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                alert('Error loading projects: ' + error.message);
            }
        }

        // Add project
        async function addProject(e) {
            e.preventDefault();

            const project = {
                title: document.getElementById('projectTitle').value,
                description: document.getElementById('projectDescription').value,
                longDescription: document.getElementById('projectLongDesc').value,
                technologies: document.getElementById('projectTechs').value.split(',').map(t => t.trim()),
                githubLink: document.getElementById('projectGithub').value,
                liveLink: document.getElementById('projectLive').value,
                image: document.getElementById('projectImage').value
            };

            try {
                const res = await fetch('/api/projects', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(project)
                });

                const data = await res.json();
                if (data.success) {
                    alert('Project added successfully!');
                    document.getElementById('projectForm').reset();
                    loadProjects();
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (error) {
                alert('Error adding project: ' + error.message);
            }
        }

        // Delete project
        async function deleteProject(id) {
            if (!confirm('Are you sure you want to delete this project?')) return;

            try {
                const res = await fetch(`/api/projects/${id}`, { method: 'DELETE' });
                const data = await res.json();

                if (data.success) {
                    alert('Project deleted successfully!');
                    loadProjects();
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (error) {
                alert('Error deleting project: ' + error.message);
            }
        }

        // Load messages
        async function loadMessages() {
            try {
                const res = await fetch('/api/contact', {
                    headers: { 'Authorization': `Bearer ${checkAuth()}` }
                });
                const data = await res.json();

                const messagesList = document.getElementById('messagesList');
                if (!data.data || data.data.length === 0) {
                    messagesList.innerHTML = '<div class="empty-state">No messages yet.</div>';
                    return;
                }

                messagesList.innerHTML = `
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Subject</th>
                                <th>Status</th>
                                <th>Date</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.data.map(msg => `
                                <tr>
                                    <td>${msg.name}</td>
                                    <td>${msg.email}</td>
                                    <td>${msg.subject}</td>
                                    <td>
                                        <span class="message-status status-${msg.status}">
                                            ${msg.status}
                                        </span>
                                    </td>
                                    <td>${new Date(msg.timestamp).toLocaleDateString()}</td>
                                    <td>
                                        <button class="btn btn-danger" onclick="deleteMessage('${msg._id}')" style="padding: 0.3rem 0.8rem; font-size: 0.85rem;">
                                            Delete
                                        </button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                alert('Error loading messages: ' + error.message);
            }
        }

        // Delete message
        async function deleteMessage(id) {
            if (!confirm('Are you sure you want to delete this message?')) return;

            try {
                const res = await fetch(`/api/contact/${id}`, { method: 'DELETE' });
                const data = await res.json();

                if (data.success) {
                    alert('Message deleted successfully!');
                    loadMessages();
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (error) {
                alert('Error deleting message: ' + error.message);
            }
        }

        // Logout
        function logout() {
            localStorage.removeItem('adminToken');
            window.location.href = '/admin-login.html';
        }

        // Initialize
        window.addEventListener('load', () => {
            checkAuth();
            loadDashboard();
        });
    </script>
</body>
</html>
